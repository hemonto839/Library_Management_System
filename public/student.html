<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <!-- TOP BAR -->
    <div class="topbar">
        <div>
            <h1>Student Dashboard</h1>
            <p id="userInfo"></p>
        </div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <!-- SIDEBAR + MAIN CONTENT -->
    <div class="portal">
        <div class="sidebar">
            <div class="sidebar-title">MENU</div>
            <a class="sidebar-link" data-section="booksSection" onclick="showSection('booksSection')">📚 Browse Books</a>
            <a class="sidebar-link" data-section="historySection" onclick="showSection('historySection')">📜 My Borrow History</a>
        </div>

        <div class="main-content">
            <!-- SECTION 1: Browse Books (with search) -->
            <div id="booksSection" class="section">
                <div class="card">
                    <h2>Available Books</h2>
                    <input type="text" id="bookSearchInput" class="search-box" placeholder="Search by title or author...">
                    <button onclick="loadBooks()">Refresh Books</button>
                    <div id="booksList"></div>
                </div>
            </div>

            <!-- SECTION 2: My Borrow History -->
            <div id="historySection" class="section">
                <div class="card">
                    <h2>My Borrow History</h2>
                    <button onclick="loadMyHistory()">Refresh My History</button>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ----------------------------
    // SIDEBAR FUNCTION
    // ----------------------------
    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';
        document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
        document.querySelector(`.sidebar-link[data-section="${sectionId}"]`).classList.add('active');
    }

    // ----------------------------
    // GLOBALS
    // ----------------------------
    let loggedInUser = null;
    let allBooks = [];

    // ----------------------------
    // CHECK STUDENT LOGIN (unchanged logic)
    // ----------------------------
    async function checkStudent() {
        try {
            const response = await fetch("/auth/me", {
                method: "GET",
                credentials: "include"
            });
            const data = await response.json();
            if (!response.ok) {
                window.location.href = "/login.html";
                return;
            }
            const role = data.user.role.toLowerCase().trim();
            if (role !== "student") {
                alert("Access denied. Student only page.");
                window.location.href = "/login.html";
                return;
            }
            loggedInUser = data.user;
            document.getElementById("userInfo").textContent = "Welcome " + loggedInUser.name + " | Role: " + loggedInUser.role;

            // Load initial data
            await loadBooks();
            await loadMyHistory();
            // Show first section (Browse Books) by default
            showSection('booksSection');
        } catch (error) {
            console.log(error);
            window.location.href = "/login.html";
        }
    }

    // ----------------------------
    // HELPER: Escape HTML
    // ----------------------------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ----------------------------
    // RENDER BOOKS (removes ID column, adds badge)
    // ----------------------------
    function renderBooksTable(books) {
        const booksList = document.getElementById("booksList");
        if (!books || books.length === 0) {
            booksList.innerHTML = "No books found.";
            return;
        }
        let html = "<table border='1'><thead><tr><th>Title</th><th>Author</th><th>Available</th><th>Total</th></thead><tbody>";
        books.forEach(book => {
            let badge = book.available_copies > 0 
                ? `<span class="badge badge-available">${book.available_copies} available</span>` 
                : `<span class="badge badge-borrowed">Not available</span>`;
            html += `<tr>
                        <td>${escapeHtml(book.title)}</td>
                        <td>${escapeHtml(book.author)}</td>
                        <td>${badge}</td>
                        <td>${book.total_copies}</td>
                      </tr>`;
        });
        html += "</tbody></table>";
        booksList.innerHTML = html;
    }

    // ----------------------------
    // LOAD BOOKS (stores allBooks, renders)
    // ----------------------------
    async function loadBooks() {
        const booksList = document.getElementById("booksList");
        booksList.innerHTML = "Loading books...";
        try {
            const response = await fetch("/books", {
                method: "GET",
                credentials: "include"
            });
            const data = await response.json();
            if (!response.ok) {
                booksList.innerHTML = data.message || "Failed to load books.";
                return;
            }
            if (!data.data || data.data.length === 0) {
                booksList.innerHTML = "No books found.";
                return;
            }
            allBooks = data.data;
            renderBooksTable(allBooks);
        } catch (error) {
            console.log(error);
            booksList.innerHTML = "Something went wrong while loading books.";
        }
    }

    // Client-side book search
    document.getElementById("bookSearchInput").addEventListener("keyup", function() {
        const query = this.value.toLowerCase();
        const filtered = allBooks.filter(book => 
            book.title.toLowerCase().includes(query) || 
            book.author.toLowerCase().includes(query)
        );
        renderBooksTable(filtered);
    });

    // ----------------------------
    // LOAD MY HISTORY (with formatted dates and status badges)
    // ----------------------------
    function formatDate(dateStr) {
        if (!dateStr) return "N/A";
        return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    async function loadMyHistory() {
        const historyList = document.getElementById("historyList");
        if (!loggedInUser) {
            historyList.innerHTML = "User information not loaded yet.";
            return;
        }
        if (!loggedInUser.student_id) {
            historyList.innerHTML = "No student ID linked with this user.";
            return;
        }
        historyList.innerHTML = "Loading history...";
        try {
            const response = await fetch("/students/" + loggedInUser.student_id + "/history", {
                method: "GET",
                credentials: "include"
            });
            const data = await response.json();
            if (!response.ok) {
                historyList.innerHTML = data.message || "Failed to load history.";
                return;
            }
            if (!data.data || data.data.length === 0) {
                historyList.innerHTML = "No borrow history found.";
                return;
            }
            let html = "<table border='1'><thead><tr><th>Book</th><th>Borrow Date</th><th>Due Date</th><th>Return Date</th><th>Status</th><th>Fine</th></thead><tbody>";
            data.data.forEach(function (record) {
                let statusBadge = "";
                if (record.status === "borrowed") statusBadge = '<span class="badge badge-borrowed">Borrowed</span>';
                else if (record.status === "returned") statusBadge = '<span class="badge badge-returned">Returned</span>';
                else statusBadge = '<span class="badge badge-overdue">Overdue</span>';
                html += `<tr>
                            <td>${escapeHtml(record.book_title)}</td>
                            <td>${formatDate(record.borrow_date)}</td>
                            <td>${formatDate(record.due_date)}</td>
                            <td>${record.return_date ? formatDate(record.return_date) : "Not returned"}</td>
                            <td>${statusBadge}</td>
                            <td>${record.fine_amount}</td>
                          </tr>`;
            });
            html += "</tbody></table>";
            historyList.innerHTML = html;
        } catch (error) {
            console.log(error);
            historyList.innerHTML = "Something went wrong while loading history.";
        }
    }

    // ----------------------------
    // LOGOUT
    // ----------------------------
    document.getElementById("logoutBtn").addEventListener("click", async function () {
        try {
            await fetch("/auth/logout", { method: "POST", credentials: "include" });
            window.location.href = "/login.html";
        } catch (error) {
            console.log(error);
            window.location.href = "/login.html";
        }
    });

    // ----------------------------
    // START
    // ----------------------------
    checkStudent();
</script>
</body>
</html>
