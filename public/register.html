<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container auth-container">
        <div class="card auth-card">
            <h1>Register</h1>
            <p class="subtitle">Create a new Library Management account</p>

            <form id="registerForm">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter full name" required>

                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email address" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>

                <label>Role</label>
                <select id="role" required>
                    <option value="">Select role</option>
                    <option value="student">Student</option>
                    <option value="librarian">Librarian</option>
                    <option value="admin">Admin</option>
                </select>

                <div id="studentIdBox">
                    <label>Student Database ID</label>
                    <input type="number" id="student_id" placeholder="Only for student role">
                    <small>Only needed if this user role is student.</small>
                </div>

                <button type="submit">Register</button>
            </form>

            <p id="message"></p>

            <p class="link-text">
                Already have an account?
                <a href="/login.html">Login here</a>
            </p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById("registerForm");
        const message = document.getElementById("message");
        const roleInput = document.getElementById("role");
        const studentIdInput = document.getElementById("student_id");
        const studentIdBox = document.getElementById("studentIdBox");

        roleInput.addEventListener("change", function () {
            const role = roleInput.value;

            if (role === "student") {
                studentIdBox.style.display = "block";
                studentIdInput.required = true;
            } else {
                studentIdBox.style.display = "none";
                studentIdInput.required = false;
                studentIdInput.value = "";
            }
        });

        // Hide student id field at first
        studentIdBox.style.display = "none";

        registerForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const role = roleInput.value.toLowerCase().trim();
            const studentIdValue = studentIdInput.value;

            const student_id = studentIdValue ? Number(studentIdValue) : null;

            message.textContent = "Creating account...";
            message.className = "";

            try {
                const response = await fetch("/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password,
                        role: role,
                        student_id: student_id
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "Registration failed.";
                    message.className = "error";
                    return;
                }

                message.textContent = "Registration successful. Redirecting to login...";
                message.className = "success";

                registerForm.reset();
                studentIdBox.style.display = "none";

                setTimeout(function () {
                    window.location.href = "/login.html";
                }, 1000);

            } catch (error) {
                message.textContent = "Something went wrong.";
                message.className = "error";
                console.log(error);
            }
        });
    </script>

</body>
</html>
