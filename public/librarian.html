<!-- librarian.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Librarian Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <!-- TOP BAR -->
    <div class="topbar">
        <div>
            <h1>Librarian Dashboard</h1>
            <p id="userInfo">Checking librarian...</p>
        </div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <!-- SIDEBAR + MAIN CONTENT -->
    <div class="portal">
        <div class="sidebar">
            <div class="sidebar-title">MENU</div>
            <a class="sidebar-link" data-section="dashboardSection" onclick="showSection('dashboardSection')">📊 Dashboard</a>
            <a class="sidebar-link" data-section="booksSection" onclick="showSection('booksSection')">📚 All Books</a>
            <a class="sidebar-link" data-section="addBookSection" onclick="showSection('addBookSection')">➕ Add Book</a>
            <a class="sidebar-link" data-section="borrowReturnSection" onclick="showSection('borrowReturnSection')">🔄 Borrow / Return</a>
            <a class="sidebar-link" data-section="historySection" onclick="showSection('historySection')">📜 Student History</a>
            <a class="sidebar-link" data-section="allStudentsSection" onclick="showSection('allStudentsSection')">👥 All Students</a>
        </div>

        <div class="main-content">
            <!-- SECTION 1: Dashboard -->
            <div id="dashboardSection" class="section">
                <div class="card">
                    <h2>Dashboard Summary</h2>
                    <button onclick="loadSummary()">Refresh Summary</button>
                    <div id="summaryContainer" class="stat-cards">Loading summary...</div>
                </div>
            </div>

            <!-- SECTION 2: All Books (with search) -->
            <div id="booksSection" class="section">
                <div class="card">
                    <h2>All Books</h2>
                    <input type="text" id="bookSearchInput" class="search-box" placeholder="Search by title or author...">
                    <button onclick="loadBooks()">Refresh Books</button>
                    <div id="booksList"></div>
                </div>
            </div>

            <!-- SECTION 3: Add Book (unchanged) -->
            <div id="addBookSection" class="section">
                <div class="card">
                    <h2>Add Book</h2>
                    <form id="addBookForm">
                        <label>Title</label>
                        <input type="text" id="bookTitle" required>
                        <label>Author</label>
                        <input type="text" id="bookAuthor" required>
                        <label>Total Copies</label>
                        <input type="number" id="totalCopies" min="1" required>
                        <label>Available Copies</label>
                        <input type="number" id="availableCopies" min="0">
                        <button type="submit">Add Book</button>
                    </form>
                    <p id="addBookMessage"></p>
                </div>
            </div>

            <!-- SECTION 4: Borrow / Return (improved) -->
            <div id="borrowReturnSection" class="section">
                <div class="card">
                    <h2>Borrow Book</h2>
                    <label>Search Student (name or university ID)</label>
                    <input type="text" id="borrowStudentSearch" class="search-box" placeholder="Type name or student ID...">
                    <div id="borrowStudentResults" class="search-results"></div>
                    <div id="borrowSelectedDisplay" class="selected-display"></div>
                    <input type="hidden" id="borrowSelectedStudentId">

                    <label>Search Book (title or author)</label>
                    <input type="text" id="borrowBookSearch" class="search-box" placeholder="Type title or author...">
                    <div id="borrowBookResults" class="search-results"></div>
                    <div id="borrowSelectedBookDisplay" class="selected-display"></div>
                    <input type="hidden" id="borrowSelectedBookId">

                    <button id="borrowSubmitBtn">Borrow Book</button>
                    <p id="borrowMessage"></p>
                </div>

                <div class="card">
                    <h2>Return Book</h2>
                    <label>Search Student to see active borrows</label>
                    <input type="text" id="returnStudentSearch" class="search-box" placeholder="Type name or student ID...">
                    <div id="returnStudentResults" class="search-results"></div>
                    <div id="returnSelectedDisplay" class="selected-display"></div>
                    <input type="hidden" id="returnSelectedStudentId">
                    <div id="activeBorrowsList"></div>
                    <hr>
                    <label>Or enter Borrow Record ID directly</label>
                    <form id="returnForm">
                        <input type="number" id="recordId" placeholder="Record ID" required>
                        <button type="submit">Return by ID</button>
                    </form>
                    <p id="returnMessage"></p>
                </div>
            </div>

            <!-- SECTION 5: Student History (search-based) -->
            <div id="historySection" class="section">
                <div class="card">
                    <h2>Student Borrow History</h2>
                    <label>Search Student</label>
                    <input type="text" id="historyStudentSearch" class="search-box" placeholder="Type name or student ID...">
                    <div id="historyStudentResults" class="search-results"></div>
                    <div id="historySelectedDisplay" class="selected-display"></div>
                    <input type="hidden" id="historySelectedStudentId">
                    <div id="historyList"></div>
                </div>
            </div>

            <!-- SECTION 6: All Students (with search) -->
            <div id="allStudentsSection" class="section">
                <div class="card">
                    <h2>All Students</h2>
                    <input type="text" id="studentSearchInput" class="search-box" placeholder="Search by name or student ID...">
                    <button onclick="loadStudents()">Refresh Students</button>
                    <div id="studentsList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ----------------------------
    // SIDEBAR FUNCTION
    // ----------------------------
    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';
        document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
        document.querySelector(`.sidebar-link[data-section="${sectionId}"]`).classList.add('active');
    }

    // ----------------------------
    // CHECK LIBRARIAN LOGIN (unchanged)
    // ----------------------------
    async function checkLibrarian() {
        try {
            const response = await fetch("/auth/me", { method: "GET", credentials: "include" });
            const data = await response.json();
            if (!response.ok) { window.location.href = "/login.html"; return; }
            const role = data.user.role.toLowerCase().trim();
            if (role !== "librarian" && role !== "admin") {
                alert("Access denied. Librarian only page.");
                window.location.href = "/login.html";
                return;
            }
            document.getElementById("userInfo").textContent = "Logged in as " + data.user.name + " | Role: " + data.user.role;
        } catch (error) {
            console.log(error);
            window.location.href = "/login.html";
        }
    }

    // ----------------------------
    // LOGOUT (unchanged)
    // ----------------------------
    document.getElementById("logoutBtn").addEventListener("click", async function () {
        await fetch("/auth/logout", { method: "POST", credentials: "include" });
        window.location.href = "/login.html";
    });

    // ----------------------------
    // MESSAGE HELPER
    // ----------------------------
    function showMessage(id, text, type) {
        const element = document.getElementById(id);
        element.textContent = text;
        element.className = type;
    }

    // ----------------------------
    // DASHBOARD SUMMARY (stat cards)
    // ----------------------------
    async function loadSummary() {
        const container = document.getElementById("summaryContainer");
        container.innerHTML = "Loading summary...";
        try {
            const response = await fetch("/reports/summary", { credentials: "include" });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message);
            const summary = data.data || data;
            let html = '';
            for (let [key, value] of Object.entries(summary)) {
                html += `<div class="stat-card"><p>${key.replace(/_/g, ' ').toUpperCase()}</p><p>${value}</p></div>`;
            }
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = '<p class="error">Could not load summary</p>';
        }
    }

    // ----------------------------
    // BOOKS (global array + render + search)
    // ----------------------------
    let allBooks = [];

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function renderBooksTable(books) {
        const booksList = document.getElementById("booksList");
        if (!books || books.length === 0) {
            booksList.innerHTML = "No books found.";
            return;
        }
        let html = "<table border='1'><thead><tr><th>Title</th><th>Author</th><th>Available</th><th>Total</th></thead><tbody>";
        books.forEach(book => {
            let badge = book.available_copies > 0 ? `<span class="badge badge-available">${book.available_copies} available</span>` : `<span class="badge badge-borrowed">Not available</span>`;
            html += `<tr><td>${escapeHtml(book.title)}</td><td>${escapeHtml(book.author)}</td><td>${badge}</td><td>${book.total_copies}</td></tr>`;
        });
        html += "</tbody></table>";
        booksList.innerHTML = html;
    }

    async function loadBooks() {
        const booksList = document.getElementById("booksList");
        booksList.innerHTML = "Loading books...";
        try {
            const response = await fetch("/books", { method: "GET", credentials: "include" });
            const data = await response.json();
            if (!response.ok) { booksList.innerHTML = data.message; return; }
            allBooks = data.data || [];
            renderBooksTable(allBooks);
        } catch (error) {
            booksList.innerHTML = "Could not load books.";
        }
    }

    document.getElementById("bookSearchInput").addEventListener("keyup", function() {
        const query = this.value.toLowerCase();
        const filtered = allBooks.filter(b => b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query));
        renderBooksTable(filtered);
    });

    // ADD BOOK (unchanged from original, but fixed availableCopies optional)
    document.getElementById("addBookForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        const title = document.getElementById("bookTitle").value;
        const author = document.getElementById("bookAuthor").value;
        const totalCopies = Number(document.getElementById("totalCopies").value);
        const availableCopiesValue = document.getElementById("availableCopies").value;
        const requestBody = { title, author, totalCopies };
        if (availableCopiesValue !== "") requestBody.availableCopies = Number(availableCopiesValue);
        try {
            const response = await fetch("/books", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify(requestBody)
            });
            const data = await response.json();
            if (!response.ok) return showMessage("addBookMessage", data.message || "Failed to add book.", "error");
            showMessage("addBookMessage", data.message || "Book added successfully.", "success");
            document.getElementById("addBookForm").reset();
            loadBooks();
        } catch (error) {
            showMessage("addBookMessage", "Something went wrong while adding book.", "error");
        }
    });

    // UPDATE BOOK (unchanged)
    document.getElementById("updateBookForm")?.addEventListener("submit", async function (event) {
        event.preventDefault();
        const bookId = document.getElementById("updateBookId").value;
        const title = document.getElementById("updateBookTitle").value;
        const author = document.getElementById("updateBookAuthor").value;
        const totalCopiesValue = document.getElementById("updateTotalCopies").value;
        const availableCopiesValue = document.getElementById("updateAvailableCopies").value;
        const requestBody = {};
        if (title) requestBody.title = title;
        if (author) requestBody.author = author;
        if (totalCopiesValue) requestBody.totalCopies = Number(totalCopiesValue);
        if (availableCopiesValue) requestBody.availableCopies = Number(availableCopiesValue);
        try {
            const response = await fetch("/books/" + bookId, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify(requestBody)
            });
            const data = await response.json();
            if (!response.ok) return showMessage("updateBookMessage", data.message || "Failed to update book.", "error");
            showMessage("updateBookMessage", data.message || "Book updated successfully.", "success");
            document.getElementById("updateBookForm").reset();
            loadBooks();
        } catch (error) {
            showMessage("updateBookMessage", "Something went wrong while updating book.", "error");
        }
    });

    // DELETE BOOK (unchanged)
    document.getElementById("deleteBookForm")?.addEventListener("submit", async function (event) {
        event.preventDefault();
        const bookId = document.getElementById("deleteBookId").value;
        try {
            const response = await fetch("/books/" + bookId, { method: "DELETE", credentials: "include" });
            const data = await response.json();
            if (!response.ok) return showMessage("deleteBookMessage", data.message || "Failed to delete book.", "error");
            showMessage("deleteBookMessage", data.message || "Book deleted successfully.", "success");
            document.getElementById("deleteBookForm").reset();
            loadBooks();
        } catch (error) {
            showMessage("deleteBookMessage", "Something went wrong while deleting book.", "error");
        }
    });

    // ----------------------------
    // STUDENTS (global array + search)
    // ----------------------------
    let allStudents = [];

    function renderStudentsTable(students) {
        const container = document.getElementById("studentsList");
        if (!students || students.length === 0) {
            container.innerHTML = "No students found.";
            return;
        }
        let html = "<table border='1'><thead><tr><th>Name</th><th>Student ID</th><th>Department</th><th>Email</th></thead><tbody>";
        students.forEach(s => {
            html += `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.student_id)}</td><td>${escapeHtml(s.department)}</td><td>${escapeHtml(s.email)}</td></tr>`;
        });
        html += "</tbody></table>";
        container.innerHTML = html;
    }

    async function loadStudents() {
        const container = document.getElementById("studentsList");
        container.innerHTML = "Loading students...";
        try {
            const response = await fetch("/students", { method: "GET", credentials: "include" });
            const data = await response.json();
            if (!response.ok) { container.innerHTML = data.message; return; }
            allStudents = data.data || [];
            renderStudentsTable(allStudents);
        } catch (error) {
            container.innerHTML = "Could not load students.";
        }
    }

    document.getElementById("studentSearchInput").addEventListener("keyup", function() {
        const query = this.value.toLowerCase();
        const filtered = allStudents.filter(s => s.name.toLowerCase().includes(query) || s.student_id.toLowerCase().includes(query));
        renderStudentsTable(filtered);
    });

    // ----------------------------
    // BORROW (search + selected IDs)
    // ----------------------------
    function setupStudentSearch(inputId, resultsId, displayId, hiddenId, onSelectCallback) {
        const input = document.getElementById(inputId);
        const resultsDiv = document.getElementById(resultsId);
        input.addEventListener("keyup", async function() {
            const query = this.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.style.display = "none"; return; }
            const matches = allStudents.filter(s => s.name.toLowerCase().includes(query) || s.student_id.toLowerCase().includes(query));
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item">No students found</div>';
            } else {
                resultsDiv.innerHTML = matches.slice(0, 6).map(s => {
                    const safeName = escapeHtml(s.name);
                    const safeId = escapeHtml(s.student_id);
                    return `<div class="search-result-item" onclick="selectStudentHelper(${s.id}, '${safeName} (${safeId})', '${inputId}', '${resultsId}', '${displayId}', '${hiddenId}', ${!!onSelectCallback}, ${s.id})">${safeName} — ${safeId}</div>`;
                }).join('');
            }
            resultsDiv.style.display = "block";
        });
    }

    function selectStudentHelper(id, displayText, inputId, resultsId, displayId, hiddenId, hasCallback, studentIdForCallback) {
        document.getElementById(hiddenId).value = id;
        document.getElementById(displayId).textContent = "Selected: " + displayText;
        document.getElementById(displayId).style.display = "block";
        document.getElementById(resultsId).style.display = "none";
        document.getElementById(inputId).value = "";
        if (hasCallback) {
            const callbackMap = {
                'returnStudentSearch': window.returnCallback,
                'historyStudentSearch': window.historyCallback
            };
            const inputElem = document.getElementById(inputId);
            const callback = callbackMap[inputElem.id];
            if (callback) callback(id);
        }
    }

    function setupBookSearch(inputId, resultsId, displayId, hiddenId) {
        const input = document.getElementById(inputId);
        const resultsDiv = document.getElementById(resultsId);
        input.addEventListener("keyup", function() {
            const query = this.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.style.display = "none"; return; }
            const matches = allBooks.filter(b => b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query));
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item">No books found</div>';
            } else {
                resultsDiv.innerHTML = matches.slice(0, 6).map(b => `<div class="search-result-item" onclick="selectBookHelper(${b.id}, '${escapeHtml(b.title)}', '${inputId}', '${resultsId}', '${displayId}', '${hiddenId}')">${escapeHtml(b.title)} by ${escapeHtml(b.author)} (${b.available_copies} left)</div>`).join('');
            }
            resultsDiv.style.display = "block";
        });
    }

    function selectBookHelper(id, title, inputId, resultsId, displayId, hiddenId) {
        document.getElementById(hiddenId).value = id;
        document.getElementById(displayId).textContent = "Selected: " + title;
        document.getElementById(displayId).style.display = "block";
        document.getElementById(resultsId).style.display = "none";
        document.getElementById(inputId).value = "";
    }

    // Borrow submit
    document.getElementById("borrowSubmitBtn").addEventListener("click", async function() {
        const studentId = document.getElementById("borrowSelectedStudentId").value;
        const bookId = document.getElementById("borrowSelectedBookId").value;
        if (!studentId || !bookId) {
            showMessage("borrowMessage", "Please select a student and a book first.", "error");
            return;
        }
        try {
            const response = await fetch("/borrow", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ studentId: Number(studentId), bookId: Number(bookId) })
            });
            const data = await response.json();
            if (!response.ok) return showMessage("borrowMessage", data.message || "Failed to borrow book.", "error");
            showMessage("borrowMessage", data.message || "Book borrowed successfully.", "success");
            document.getElementById("borrowSelectedStudentId").value = "";
            document.getElementById("borrowSelectedBookId").value = "";
            document.getElementById("borrowSelectedDisplay").style.display = "none";
            document.getElementById("borrowSelectedBookDisplay").style.display = "none";
            loadBooks();
        } catch (error) {
            showMessage("borrowMessage", "Something went wrong while borrowing book.", "error");
        }
    });

    // Setup borrow searches
    setupStudentSearch("borrowStudentSearch", "borrowStudentResults", "borrowSelectedDisplay", "borrowSelectedStudentId", false);
    setupBookSearch("borrowBookSearch", "borrowBookResults", "borrowSelectedBookDisplay", "borrowSelectedBookId");

    // ----------------------------
    // RETURN (show active borrows for selected student)
    // ----------------------------
    async function loadActiveBorrows(studentId) {
        const container = document.getElementById("activeBorrowsList");
        container.innerHTML = "Loading active borrows...";
        try {
            const response = await fetch(`/students/${studentId}/history`, { credentials: "include" });
            const data = await response.json();
            if (!response.ok) throw new Error();
            const records = data.data.filter(r => r.status === "borrowed");
            if (records.length === 0) {
                container.innerHTML = "<p>No active borrows for this student.</p>";
                return;
            }
            let html = "<table border='1'><thead><tr><th>Book</th><th>Due Date</th><th>Fine</th><th>Action</th></thead><tbody>";
            records.forEach(rec => {
                html += `<tr>
                            <td>${escapeHtml(rec.book_title)}</td>
                            <td>${formatDate(rec.due_date)}</td>
                            <td>${rec.fine_amount}</td>
                            <td><button onclick="returnBook(${rec.record_id || rec.id})">Return</button></td>
                        </tr>`;
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = "<p class='error'>Could not load borrows.</p>";
        }
    }

    async function returnBook(recordId) {
        try {
            const response = await fetch("/return", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ recordId })
            });
            const data = await response.json();
            if (!response.ok) return showMessage("returnMessage", data.message || "Failed to return book.", "error");
            showMessage("returnMessage", data.message || "Book returned successfully.", "success");
            const studentId = document.getElementById("returnSelectedStudentId").value;
            if (studentId) loadActiveBorrows(studentId);
            loadBooks();
        } catch(e) {
            showMessage("returnMessage", "Something went wrong while returning book.", "error");
        }
    }

    window.returnBook = returnBook;
    window.returnCallback = loadActiveBorrows;
    setupStudentSearch("returnStudentSearch", "returnStudentResults", "returnSelectedDisplay", "returnSelectedStudentId", true);

    // Manual return form (unchanged)
    document.getElementById("returnForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const recordId = Number(document.getElementById("recordId").value);
        try {
            const response = await fetch("/return", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ recordId })
            });
            const data = await response.json();
            if (!response.ok) return showMessage("returnMessage", data.message || "Failed to return book.", "error");
            showMessage("returnMessage", data.message || "Book returned successfully.", "success");
            document.getElementById("returnForm").reset();
            loadBooks();
        } catch(e) {
            showMessage("returnMessage", "Something went wrong while returning book.", "error");
        }
    });

    // ----------------------------
    // STUDENT HISTORY (search based)
    // ----------------------------
    async function loadStudentHistory(studentId) {
        const container = document.getElementById("historyList");
        container.innerHTML = "Loading history...";
        try {
            const response = await fetch(`/students/${studentId}/history`, { credentials: "include" });
            const data = await response.json();
            if (!response.ok) { container.innerHTML = data.message; return; }
            const records = data.data;
            if (!records || records.length === 0) {
                container.innerHTML = "No history found.";
                return;
            }
            let html = "<table border='1'><thead><tr><th>Book</th><th>Borrow Date</th><th>Due Date</th><th>Return Date</th><th>Status</th><th>Fine</th></thead><tbody>";
            records.forEach(rec => {
                let statusBadge = "";
                if (rec.status === "borrowed") statusBadge = '<span class="badge badge-borrowed">Borrowed</span>';
                else if (rec.status === "returned") statusBadge = '<span class="badge badge-returned">Returned</span>';
                else statusBadge = '<span class="badge badge-overdue">Overdue</span>';
                html += `<tr>
                            <td>${escapeHtml(rec.book_title)}</td>
                            <td>${formatDate(rec.borrow_date)}</td>
                            <td>${formatDate(rec.due_date)}</td>
                            <td>${rec.return_date ? formatDate(rec.return_date) : "Not returned"}</td>
                            <td>${statusBadge}</td>
                            <td>${rec.fine_amount}</td>
                        </tr>`;
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = "Could not load history.";
        }
    }

    function formatDate(dateStr) { if (!dateStr) return "N/A"; return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }

    window.historyCallback = loadStudentHistory;
    setupStudentSearch("historyStudentSearch", "historyStudentResults", "historySelectedDisplay", "historySelectedStudentId", true);

    // ----------------------------
    // PAGE START
    // ----------------------------
    checkLibrarian().then(() => {
        loadSummary();
        loadBooks();
        loadStudents();
        showSection('dashboardSection');
    });
</script>
</body>
</html>
