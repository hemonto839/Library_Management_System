<!-- librarian.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Librarian Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">

        <!-- TOP BAR -->
        <div class="topbar">
            <div>
                <h1>Librarian Dashboard</h1>
                <p id="userInfo">Checking librarian...</p>
            </div>

            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <!-- REPORT SUMMARY -->
        <div class="card">
            <h2>Report Summary</h2>
            <button onclick="loadSummary()">Load Summary</button>
            <div id="summaryBox"></div>
        </div>

        <!-- STUDENT LIST -->
        <div class="card">
            <h2>All Students</h2>
            <button onclick="loadStudents()">Refresh Students</button>
            <div id="studentsList"></div>
        </div>

        <!-- BOOK LIST -->
        <div class="card">
            <h2>All Books</h2>
            <button onclick="loadBooks()">Refresh Books</button>
            <div id="booksList"></div>
        </div>

        <!-- ADD BOOK -->
        <div class="card">
            <h2>Add Book</h2>

            <form id="addBookForm">
                <label>Title</label>
                <input type="text" id="bookTitle" required>

                <label>Author</label>
                <input type="text" id="bookAuthor" required>

                <label>Total Copies</label>
                <input type="number" id="totalCopies" min="1" required>

                <label>Available Copies</label>
                <input type="number" id="availableCopies" min="0">

                <button type="submit">Add Book</button>
            </form>

            <p id="addBookMessage"></p>
        </div>

        <!-- UPDATE BOOK -->
        <div class="card">
            <h2>Update Book</h2>

            <form id="updateBookForm">
                <label>Book Database ID</label>
                <input type="number" id="updateBookId" required>

                <label>New Title</label>
                <input type="text" id="updateBookTitle">

                <label>New Author</label>
                <input type="text" id="updateBookAuthor">

                <label>New Total Copies</label>
                <input type="number" id="updateTotalCopies" min="1">

                <label>New Available Copies</label>
                <input type="number" id="updateAvailableCopies" min="0">

                <button type="submit">Update Book</button>
            </form>

            <p id="updateBookMessage"></p>
        </div>

        <!-- DELETE BOOK -->
        <div class="card">
            <h2>Delete Book</h2>

            <form id="deleteBookForm">
                <label>Book Database ID</label>
                <input type="number" id="deleteBookId" required>

                <button type="submit">Delete Book</button>
            </form>

            <p id="deleteBookMessage"></p>
        </div>

        <!-- BORROW BOOK -->
        <div class="card">
            <h2>Borrow Book for Student</h2>

            <form id="borrowForm">
                <label>Student Database ID</label>
                <input type="number" id="borrowStudentId" required>

                <label>Book Database ID</label>
                <input type="number" id="borrowBookId" required>

                <button type="submit">Borrow Book</button>
            </form>

            <p id="borrowMessage"></p>
        </div>

        <!-- RETURN BOOK -->
        <div class="card">
            <h2>Return Book</h2>

            <form id="returnForm">
                <label>Borrow Record ID</label>
                <input type="number" id="recordId" required>

                <button type="submit">Return Book</button>
            </form>

            <p id="returnMessage"></p>
        </div>

        <!-- STUDENT HISTORY -->
        <div class="card">
            <h2>Check Student Borrow History</h2>

            <form id="historyForm">
                <label>Student Database ID</label>
                <input type="number" id="historyStudentId" required>

                <button type="submit">Check History</button>
            </form>

            <div id="historyList"></div>
        </div>

    </div>

    <script>
        // ----------------------------
        // CHECK LIBRARIAN LOGIN
        // ----------------------------
        async function checkLibrarian() {
            try {
                const response = await fetch("/auth/me", {
                    method: "GET",
                    credentials: "include"
                });

                const data = await response.json();

                if (!response.ok) {
                    window.location.href = "/login.html";
                    return;
                }

                const role = data.user.role.toLowerCase().trim();

                if (role !== "librarian" && role !== "admin") {
                    alert("Access denied. Librarian only page.");
                    window.location.href = "/login.html";
                    return;
                }

                document.getElementById("userInfo").textContent =
                    "Logged in as " + data.user.name + " | Role: " + data.user.role;

            } catch (error) {
                console.log(error);
                window.location.href = "/login.html";
            }
        }

        // ----------------------------
        // LOGOUT
        // ----------------------------
        document.getElementById("logoutBtn").addEventListener("click", async function () {
            try {
                await fetch("/auth/logout", {
                    method: "POST",
                    credentials: "include"
                });

                window.location.href = "/login.html";

            } catch (error) {
                console.log(error);
                window.location.href = "/login.html";
            }
        });

        // ----------------------------
        // MESSAGE HELPER
        // ----------------------------
        function showMessage(id, text, type) {
            const element = document.getElementById(id);
            element.textContent = text;
            element.className = type;
        }

        // ----------------------------
        // LOAD SUMMARY
        // ----------------------------
        async function loadSummary() {
            const summaryBox = document.getElementById("summaryBox");
            summaryBox.innerHTML = "Loading summary...";

            try {
                const response = await fetch("/reports/summary", {
                    method: "GET",
                    credentials: "include"
                });

                const data = await response.json();

                if (!response.ok) {
                    summaryBox.innerHTML = data.message || "Failed to load summary.";
                    return;
                }

                const summary = data.data || data;

                let html = "<table>";
                html += "<tr>";
                html += "<th>Item</th>";
                html += "<th>Value</th>";
                html += "</tr>";

                for (let key in summary) {
                    html += "<tr>";
                    html += "<td>" + key + "</td>";
                    html += "<td>" + summary[key] + "</td>";
                    html += "</tr>";
                }

                html += "</table>";
                summaryBox.innerHTML = html;

            } catch (error) {
                console.log(error);
                summaryBox.innerHTML = "Something went wrong while loading summary.";
            }
        }

        // ----------------------------
        // LOAD STUDENTS
        // ----------------------------
        async function loadStudents() {
            const studentsList = document.getElementById("studentsList");
            studentsList.innerHTML = "Loading students...";

            try {
                const response = await fetch("/students", {
                    method: "GET",
                    credentials: "include"
                });

                const data = await response.json();

                if (!response.ok) {
                    studentsList.innerHTML = data.message || "Failed to load students.";
                    return;
                }

                const students = data.data;

                if (!students || students.length === 0) {
                    studentsList.innerHTML = "No students found.";
                    return;
                }

                let html = "<table>";
                html += "<tr>";
                html += "<th>Database ID</th>";
                html += "<th>Name</th>";
                html += "<th>Student ID</th>";
                html += "<th>Department</th>";
                html += "<th>Email</th>";
                html += "</tr>";

                students.forEach(function (student) {
                    html += "<tr>";
                    html += "<td>" + student.id + "</td>";
                    html += "<td>" + student.name + "</td>";
                    html += "<td>" + student.student_id + "</td>";
                    html += "<td>" + student.department + "</td>";
                    html += "<td>" + student.email + "</td>";
                    html += "</tr>";
                });

                html += "</table>";
                studentsList.innerHTML = html;

            } catch (error) {
                console.log(error);
                studentsList.innerHTML = "Something went wrong while loading students.";
            }
        }

        // ----------------------------
        // LOAD BOOKS
        // ----------------------------
        async function loadBooks() {
            const booksList = document.getElementById("booksList");
            booksList.innerHTML = "Loading books...";

            try {
                const response = await fetch("/books", {
                    method: "GET",
                    credentials: "include"
                });

                const data = await response.json();

                if (!response.ok) {
                    booksList.innerHTML = data.message || "Failed to load books.";
                    return;
                }

                const books = data.data;

                if (!books || books.length === 0) {
                    booksList.innerHTML = "No books found.";
                    return;
                }

                let html = "<table>";
                html += "<tr>";
                html += "<th>ID</th>";
                html += "<th>Title</th>";
                html += "<th>Author</th>";
                html += "<th>Total Copies</th>";
                html += "<th>Available Copies</th>";
                html += "</tr>";

                books.forEach(function (book) {
                    html += "<tr>";
                    html += "<td>" + book.id + "</td>";
                    html += "<td>" + book.title + "</td>";
                    html += "<td>" + book.author + "</td>";
                    html += "<td>" + book.total_copies + "</td>";
                    html += "<td>" + book.available_copies + "</td>";
                    html += "</tr>";
                });

                html += "</table>";
                booksList.innerHTML = html;

            } catch (error) {
                console.log(error);
                booksList.innerHTML = "Something went wrong while loading books.";
            }
        }

        // ----------------------------
        // ADD BOOK
        // ----------------------------
        document.getElementById("addBookForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const title = document.getElementById("bookTitle").value;
            const author = document.getElementById("bookAuthor").value;
            const totalCopies = Number(document.getElementById("totalCopies").value);
            const availableCopiesValue = document.getElementById("availableCopies").value;

            const requestBody = {
                title: title,
                author: author,
                totalCopies: totalCopies
            };

            if (availableCopiesValue !== "") {
                requestBody.availableCopies = Number(availableCopiesValue);
            }

            try {
                const response = await fetch("/books", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage("addBookMessage", data.message || "Failed to add book.", "error");
                    return;
                }

                showMessage("addBookMessage", data.message || "Book added successfully.", "success");
                document.getElementById("addBookForm").reset();
                loadBooks();

            } catch (error) {
                console.log(error);
                showMessage("addBookMessage", "Something went wrong while adding book.", "error");
            }
        });

        // ----------------------------
        // UPDATE BOOK
        // ----------------------------
        document.getElementById("updateBookForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const bookId = document.getElementById("updateBookId").value;

            const title = document.getElementById("updateBookTitle").value;
            const author = document.getElementById("updateBookAuthor").value;
            const totalCopiesValue = document.getElementById("updateTotalCopies").value;
            const availableCopiesValue = document.getElementById("updateAvailableCopies").value;

            const requestBody = {};

            if (title) {
                requestBody.title = title;
            }

            if (author) {
                requestBody.author = author;
            }

            if (totalCopiesValue) {
                requestBody.totalCopies = Number(totalCopiesValue);
            }

            if (availableCopiesValue) {
                requestBody.availableCopies = Number(availableCopiesValue);
            }

            try {
                const response = await fetch("/books/" + bookId, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage("updateBookMessage", data.message || "Failed to update book.", "error");
                    return;
                }

                showMessage("updateBookMessage", data.message || "Book updated successfully.", "success");
                document.getElementById("updateBookForm").reset();
                loadBooks();

            } catch (error) {
                console.log(error);
                showMessage("updateBookMessage", "Something went wrong while updating book.", "error");
            }
        });

        // ----------------------------
        // DELETE BOOK
        // ----------------------------
        document.getElementById("deleteBookForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const bookId = document.getElementById("deleteBookId").value;

            try {
                const response = await fetch("/books/" + bookId, {
                    method: "DELETE",
                    credentials: "include"
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage("deleteBookMessage", data.message || "Failed to delete book.", "error");
                    return;
                }

                showMessage("deleteBookMessage", data.message || "Book deleted successfully.", "success");
                document.getElementById("deleteBookForm").reset();
                loadBooks();

            } catch (error) {
                console.log(error);
                showMessage("deleteBookMessage", "Something went wrong while deleting book.", "error");
            }
        });

        // ----------------------------
        // BORROW BOOK
        // ----------------------------
        document.getElementById("borrowForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const studentId = Number(document.getElementById("borrowStudentId").value);
            const bookId = Number(document.getElementById("borrowBookId").value);

            try {
                const response = await fetch("/borrow", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        studentId: studentId,
                        bookId: bookId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage("borrowMessage", data.message || "Failed to borrow book.", "error");
                    return;
                }

                showMessage("borrowMessage", data.message || "Book borrowed successfully.", "success");
                document.getElementById("borrowForm").reset();
                loadBooks();

            } catch (error) {
                console.log(error);
                showMessage("borrowMessage", "Something went wrong while borrowing book.", "error");
            }
        });

        // ----------------------------
        // RETURN BOOK
        // ----------------------------
        document.getElementById("returnForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const recordId = Number(document.getElementById("recordId").value);

            try {
                const response = await fetch("/return", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        recordId: recordId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage("returnMessage", data.message || "Failed to return book.", "error");
                    return;
                }

                showMessage("returnMessage", data.message || "Book returned successfully.", "success");
                document.getElementById("returnForm").reset();
                loadBooks();

            } catch (error) {
                console.log(error);
                showMessage("returnMessage", "Something went wrong while returning book.", "error");
            }
        });

        // ----------------------------
        // CHECK STUDENT HISTORY
        // ----------------------------
        document.getElementById("historyForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const studentId = Number(document.getElementById("historyStudentId").value);
            const historyList = document.getElementById("historyList");

            historyList.innerHTML = "Loading history...";

            try {
                const response = await fetch("/students/" + studentId + "/history", {
                    method: "GET",
                    credentials: "include"
                });

                const data = await response.json();

                if (!response.ok) {
                    historyList.innerHTML = data.message || "Failed to load history.";
                    return;
                }

                const records = data.data;

                if (!records || records.length === 0) {
                    historyList.innerHTML = "No history found.";
                    return;
                }

                let html = "<table>";
                html += "<tr>";
                html += "<th>Record ID</th>";
                html += "<th>Student</th>";
                html += "<th>Book</th>";
                html += "<th>Borrow Date</th>";
                html += "<th>Due Date</th>";
                html += "<th>Return Date</th>";
                html += "<th>Status</th>";
                html += "<th>Fine</th>";
                html += "</tr>";

                records.forEach(function (record) {
                    html += "<tr>";
                    html += "<td>" + (record.record_id || record.id) + "</td>";
                    html += "<td>" + (record.student_name || "") + "</td>";
                    html += "<td>" + (record.book_title || "") + "</td>";
                    html += "<td>" + (record.borrow_date ? record.borrow_date.substring(0, 10) : "") + "</td>";
                    html += "<td>" + (record.due_date ? record.due_date.substring(0, 10) : "") + "</td>";
                    html += "<td>" + (record.return_date ? record.return_date.substring(0, 10) : "Not returned") + "</td>";
                    html += "<td>" + record.status + "</td>";
                    html += "<td>" + record.fine_amount + "</td>";
                    html += "</tr>";
                });

                html += "</table>";
                historyList.innerHTML = html;

            } catch (error) {
                console.log(error);
                historyList.innerHTML = "Something went wrong while loading history.";
            }
        });

        // ----------------------------
        // PAGE START
        // ----------------------------
        checkLibrarian();
        loadSummary();
        loadStudents();
        loadBooks();
    </script>

</body>
</html>
